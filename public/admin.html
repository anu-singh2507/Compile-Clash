<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FunScript Admin Portal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; padding: 20px; }
        .admin-box {
            background: #0a0a0c;
            border: 2px solid var(--neon-pink);
            padding: 40px;
            width: 100%;
            max-width: 900px;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 0, 234, 0.3);
        }
        .login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        .management-table {
            width: 100%; margin-top: 30px; border-collapse: collapse;
            color: white; font-family: 'Courier New', Courier, monospace;
        }
        .management-table th { border-bottom: 2px solid var(--neon-pink); padding: 10px; color: var(--neon-pink); }
        .management-table td { padding: 10px; border-bottom: 1px solid #333; }
        .btn-action { padding: 5px 10px; cursor: pointer; border: 1px solid; background: transparent; font-size: 12px; }
        .btn-delete { color: #ff3939; border-color: #ff3939; }
        .btn-reset { color: #ff8c00; border-color: #ff8c00; }
        .score-input { width: 60px; background: #222; border: 1px solid #444; color: #00fff3; text-align: center; }
        .status-pill { display: inline-block; padding: 5px 15px; border-radius: 20px; background: #222; margin-bottom: 20px; }
        .status-live { color: var(--neon-green); border: 1px solid var(--neon-green); }
        .status-waiting { color: var(--neon-pink); border: 1px solid var(--neon-pink); }
    </style>
</head>
<body>
    <div id="login-screen" class="login-overlay">
        <div class="admin-box" style="max-width: 400px;">
            <h2 class="neon-glow" style="color: var(--neon-blue);">ADMIN ACCESS</h2>
            <input type="text" id="admin-user" placeholder="USERNAME" class="cyber-input" style="width: 80%; margin-bottom: 15px;">
            <input type="password" id="admin-pass" placeholder="PASSWORD" class="cyber-input" style="width: 80%; margin-bottom: 15px;">
            <button id="btn-login" class="cyber-button" style="width: 80%;">[ LOGIN ]</button>
        </div>
    </div>

    <div class="admin-wrapper">
        <div class="admin-box">
            <h1 class="neon-glow" style="color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink);">ADMIN CONTROL</h1>
            <p class="sys-msg">FUNSCRIPT SESSION MANAGEMENT</p>
            
            <div id="status-display" class="status-pill status-waiting">STATUS: WAITING</div>
            
            <div style="display: flex; justify-content: center; gap: 20px;">
                <button id="btn-start" class="cyber-button" style="border-color: var(--neon-green); color: var(--neon-green);">[ INITIATE START SIGNAL ]</button>
                <button id="btn-reset-all" class="cyber-button" style="border-color: var(--neon-pink); color: var(--neon-pink);">[ RESET SESSION ]</button>
            </div>

            <div style="max-height: 400px; overflow-y: auto; margin-top: 30px; border: 1px solid #333;">
                <table class="management-table" style="margin-top: 0;">
                    <thead style="position: sticky; top: 0; background: #0a0a0c; z-index: 10;">
                        <tr>
                            <th>TEAM NAME</th>
                            <th>LEVEL</th>
                            <th>SCORE</th>
                            <th>TIME</th>
                            <th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="team-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const statusDisplay = document.getElementById('status-display');
        
        document.getElementById('btn-login').onclick = () => {
            const u = document.getElementById('admin-user').value;
            const p = document.getElementById('admin-pass').value;
            fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            }).then(r => r.json()).then(data => {
                if(data.success) document.getElementById('login-screen').classList.add('hidden');
                else alert("Access Denied");
            });
        };

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`;
        }

        function refreshDashboard() {
            // Update Status
            fetch('/api/game-status').then(r => r.json()).then(data => {
                statusDisplay.innerText = data.started ? "STATUS: LIVE" : "STATUS: WAITING";
                statusDisplay.className = `status-pill ${data.started ? 'status-live' : 'status-waiting'}`;
            });

            // Update Team List
            fetch('/api/leaderboard').then(r => r.json()).then(teams => {
                const tbody = document.getElementById('team-list');
                tbody.innerHTML = '';
                teams.forEach(t => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${t.team_name}</td>
                        <td style="color: ${t.current_level >= 5 ? '#39ff14' : 'inherit'}">${t.current_level >= 5 ? 'FINISHED' : t.current_level + '-' + t.current_sublevel}</td>
                        <td><input type="number" class="score-input" value="${t.total_score}" onchange="updateScore(${t.id}, this.value)"></td>
                        <td>${formatTime(t.active_time_seconds)}</td>
                        <td>
                            <button class="btn-action btn-reset" onclick="resetTeam(${t.id})">RESET</button>
                            <button class="btn-action btn-delete" onclick="deleteTeam(${t.id})">DELETE</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            });
        }

        window.deleteTeam = (id) => {
            if(!confirm("Permantly delete this team?")) return;
            fetch(`/api/admin/teams/${id}`, { method: 'DELETE' }).then(() => refreshDashboard());
        };

        window.resetTeam = (id) => {
            if(!confirm("Reset team progress?")) return;
            fetch(`/api/admin/teams/${id}/reset`, { method: 'POST' }).then(() => refreshDashboard());
        };

        window.updateScore = (id, score) => {
            fetch(`/api/admin/teams/${id}/score`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ new_score: parseInt(score) })
            }).then(() => refreshDashboard());
        };

        document.getElementById('btn-start').onclick = () => {
            fetch('/api/admin/start-game', { method: 'POST' }).then(() => refreshDashboard());
        };

        document.getElementById('btn-reset-all').onclick = () => {
            fetch('/api/admin/reset-game', { method: 'POST' }).then(() => refreshDashboard());
        };

        setInterval(refreshDashboard, 3000);
        refreshDashboard();
    </script>
</body>
</html>
